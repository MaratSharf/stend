{% extends "base.html" %}
{% block title %}MES — Управление ролями{% endblock %}
{% block content %}
<div class="container">
    <header>
        <h1>🔐 Управление ролями</h1>
        <div class="header-actions">
            <button class="btn btn-primary" onclick="showAddRoleModal()">
                ➕ Добавить роль
            </button>
            <a href="/users" class="btn btn-secondary">Пользователи</a>
        </div>
    </header>

    <div class="role-selector-section">
        <label for="roleSelect">Выберите роль:</label>
        <select id="roleSelect" onchange="loadRolePermissions()">
            {% for role_key, role_label in roles.items() %}
            <option value="{{ role_key }}">{{ role_label }}</option>
            {% endfor %}
        </select>
    </div>

    <div id="roleDetails" class="permissions-container" style="display:none;">
        <h2 id="roleTitle"></h2>
        <p class="role-description" id="roleDescription"></p>

        <!-- Screens with operations -->
        <div id="screensContainer">
            <!-- Заполняется JS -->
        </div>

        <div class="role-actions">
            <button class="btn btn-primary" onclick="savePermissions()">
                💾 Сохранить права
            </button>
            <button class="btn btn-secondary" onclick="resetToDefault()">
                ↺ Сбросить на стандартные
            </button>
        </div>
    </div>
</div>

<div id="addRoleModal" class="modal" style="display:none;">
    <div class="modal-content modal-large">
        <div class="modal-header">
            <h3>Добавить новую роль</h3>
            <span class="modal-close" onclick="closeAddRoleModal()">&times;</span>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label for="newRoleName">Название роли:</label>
                <input type="text" id="newRoleName" placeholder="Например: manager" pattern="[a-zA-Z_][a-zA-Z0-9_]*" required>
                <small>Только буквы и подчёркивания, начинать с буквы</small>
            </div>

            <div class="form-group">
                <label>Права доступа:</label>
                <div class="role-permissions-select">
                    <div class="permission-presets">
                        <button type="button" class="btn btn-secondary" onclick="setPreset('viewer')">
                            👁️ Viewer (только просмотр)
                        </button>
                        <button type="button" class="btn btn-primary" onclick="setPreset('operator')">
                            ⚙️ Operator (операционные действия)
                        </button>
                        <button type="button" class="btn btn-success" onclick="setPreset('custom')">
                            ⚙️ Настроить вручную
                        </button>
                    </div>
                    <div id="customPermissions" class="custom-permissions" style="display:none;">
                        <label class="checkbox-label">
                            <input type="checkbox" id="perm_order_view" value="order_view" checked>
                            <span>Экран: Заказы</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="perm_production_view" value="production_view" checked>
                            <span>Экран: Производство</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="perm_map_view" value="map_view" checked>
                            <span>Экран: Карта станций</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="perm_create_order" value="create_order">
                            <span>Создание заказов</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="perm_launch_order" value="launch_order">
                            <span>Запуск в производство</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="perm_move_order" value="move_order">
                            <span>Перемещение заказов</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="perm_complete_order" value="complete_order">
                            <span>Завершение заказа</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="perm_cancel_order" value="cancel_order">
                            <span>Отмена заказа</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="perm_view_statistics" value="view_statistics">
                            <span>Просмотр статистики</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="perm_user_view" value="user_view">
                            <span>Экран: Пользователи</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="perm_role_view" value="role_view">
                            <span>Экран: Роли</span>
                        </label>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeAddRoleModal()">Отмена</button>
            <button class="btn btn-primary" onclick="createNewRole()">Создать</button>
        </div>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
(function() {
    let currentRole = null;
    let rolePermissionsData = {};

    const roleLabels = {
        {% for role_key, role_label in roles.items() %}
        '{{ role_key }}': '{{ role_label }}'{% if not loop.last %},{% endif %}
        {% endfor %}
    };

    const roleDescriptions = {
        {% for role_key, role_label in roles.items() %}
        '{{ role_key }}': '{% if role_key == "admin" %}Полный доступ ко всем функциям системы{% elif role_key == "operator" %}Операционные действия с заказами и станциями{% else %}Только просмотр данных и статистики{% endif %}'{% if not loop.last %},{% endif %}
        {% endfor %}
    };

    const screensData = {
        {% for screen_key, screen_info in screens.items() %}
        '{{ screen_key }}': {
            label: '{{ screen_info.label }}',
            main_permission: '{{ screen_info.main_permission }}',
            operations: {{ screen_info.operations | tojson }}
        }{% if not loop.last %},{% endif %}
        {% endfor %}
    };

    const allPermissions = {
        {% for perm_key, perm_info in all_permissions.items() %}
        '{{ perm_key }}': { 
            label: '{{ perm_info.label }}', 
            description: '{{ perm_info.description }}' 
        }{% if not loop.last %},{% endif %}
        {% endfor %}
    };

    const initialRolePermissions = {
        {% for role_key in roles.keys() %}
        '{{ role_key }}': {{ role_permissions.get(role_key, []) | tojson }}{% if not loop.last %},{% endif %}
        {% endfor %}
    };

    function showToast(message, type = 'info') {
        const container = document.getElementById('toastContainer');
        if (!container) return;
        
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.textContent = message;
        container.appendChild(toast);
        
        setTimeout(() => toast.remove(), 3000);
    }

    function authHeaders() {
        return MESUtils.authHeaders({ 'Content-Type': 'application/json' });
    }

    function getAllPermissionsForRole() {
        const checkboxes = document.querySelectorAll('input[type="checkbox"]:checked');
        return Array.from(checkboxes).map(cb => cb.value);
    }

    window.loadRolePermissions = function() {
        const select = document.getElementById('roleSelect');
        currentRole = select.value;
        
        document.getElementById('roleDetails').style.display = 'block';
        document.getElementById('roleTitle').textContent = roleLabels[currentRole] || currentRole;
        document.getElementById('roleDescription').textContent = roleDescriptions[currentRole] || '';
        
        renderScreens();
    };

    function renderScreens() {
        const container = document.getElementById('screensContainer');
        const currentPerms = new Set(initialRolePermissions[currentRole] || []);
        
        let html = '';
        
        for (const [screenKey, screenInfo] of Object.entries(screensData)) {
            const hasMainPerm = currentPerms.has(screenInfo.main_permission);
            
            // Check which operations are enabled
            const enabledOps = screenInfo.operations.filter(op => currentPerms.has(op));
            
            html += `
                <div class="screen-section ${hasMainPerm ? 'screen-enabled' : ''}">
                    <div class="screen-header">
                        <label class="screen-checkbox-label">
                            <input type="checkbox" 
                                   class="screen-main-checkbox" 
                                   value="${screenInfo.main_permission}"
                                   ${hasMainPerm ? 'checked' : ''}
                                   onchange="toggleScreen('${screenKey}', this.checked)">
                            <span class="screen-name">${screenInfo.label}</span>
                        </label>
                    </div>
                    ${screenInfo.operations.length > 0 ? `
                    <div class="screen-operations" style="display: ${hasMainPerm ? 'block' : 'none'}">
                        <div class="operations-list">
                            ${screenInfo.operations.map(op => {
                                const permInfo = PERMISSIONS[op];
                                const opChecked = currentPerms.has(op);
                                return `
                                    <label class="operation-item">
                                        <input type="checkbox" 
                                               name="screen_ops_${screenKey}"
                                               value="${op}"
                                               ${opChecked ? 'checked' : ''}>
                                        <span class="operation-label">${permInfo.label}</span>
                                        <span class="operation-desc">${permInfo.description}</span>
                                    </label>
                                `;
                            }).join('')}
                        </div>
                    </div>
                    ` : ''}
                </div>
            `;
        }
        
        container.innerHTML = html;
    }

    // Global permission data (from server)
    const PERMISSIONS = allPermissions;

    window.toggleScreen = function(screenKey, enabled) {
        const opsContainer = document.querySelector(`.screen-section[data-screen="${screenKey}"] .screen-operations`);
        if (opsContainer) {
            opsContainer.style.display = enabled ? 'block' : 'none';
        }
        
        // Update parent class
        const section = document.querySelector(`.screen-section[data-screen="${screenKey}"]`);
        if (section) {
            section.classList.toggle('screen-enabled', enabled);
        }
    };

    window.savePermissions = async function() {
        if (!currentRole) return;
        
        const permissions = getAllPermissionsForRole();

        try {
            const response = await fetch(`/api/roles/${currentRole}/permissions`, {
                method: 'POST',
                headers: authHeaders(),
                body: JSON.stringify({ permissions })
            });

            const data = await response.json();
            if (response.ok) {
                showToast('Права успешно сохранены', 'success');
                initialRolePermissions[currentRole] = permissions;
                renderScreens();
            } else {
                showToast(data.error || 'Ошибка сохранения', 'error');
            }
        } catch (error) {
            showToast('Ошибка соединения', 'error');
        }
    };

    window.resetToDefault = async function() {
        if (!currentRole) return;
        if (!confirm(`Сбросить права "${roleLabels[currentRole]}" к стандартным?`)) return;

        try {
            const response = await fetch(`/api/roles/${currentRole}/permissions/reset`, {
                method: 'POST',
                headers: authHeaders()
            });

            const data = await response.json();
            if (response.ok) {
                showToast('Права сброшены к стандартным', 'success');
                initialRolePermissions[currentRole] = data.permissions;
                renderScreens();
            } else {
                showToast(data.error || 'Ошибка сброса', 'error');
            }
        } catch (error) {
            showToast('Ошибка соединения', 'error');
        }
    };

    window.showAddRoleModal = function() {
        document.getElementById('addRoleModal').style.display = 'flex';
        document.getElementById('newRoleName').focus();
    };

    function closeAddRoleModal() {
        document.getElementById('addRoleModal').style.display = 'none';
        document.getElementById('newRoleName').value = '';
        document.getElementById('customPermissions').style.display = 'none';
        document.querySelectorAll('#customPermissions input[type="checkbox"]').forEach(cb => {
            cb.checked = false;
        });
    }

    // Preset permission sets
    const PERMISSION_PRESETS = {
        viewer: ['order_view', 'production_view', 'map_view', 'view_statistics'],
        operator: ['order_view', 'production_view', 'map_view', 'create_order', 'launch_order', 'move_order', 'complete_order', 'cancel_order', 'view_statistics'],
        custom: null
    };

    window.setPreset = function(preset) {
        const customDiv = document.getElementById('customPermissions');
        
        if (preset === 'custom') {
            customDiv.style.display = 'block';
        } else {
            customDiv.style.display = 'none';
            const perms = PERMISSION_PRESETS[preset];
            // Uncheck all
            document.querySelectorAll('#customPermissions input[type="checkbox"]').forEach(cb => {
                cb.checked = false;
            });
            // Check selected
            perms.forEach(perm => {
                const cb = document.getElementById('perm_' + perm);
                if (cb) cb.checked = true;
            });
        }
    };

    function getSelectedPermissions() {
        const customDiv = document.getElementById('customPermissions');
        const checkboxes = customDiv.querySelectorAll('input[type="checkbox"]:checked');
        return Array.from(checkboxes).map(cb => cb.value);
    }

    window.createNewRole = async function() {
        const roleName = document.getElementById('newRoleName').value.trim();
        
        if (!roleName) {
            showToast('Введите название роли', 'error');
            return;
        }
        
        if (!/^[a-zA-Z_][a-zA-Z0-9_]*$/.test(roleName)) {
            showToast('Неверный формат. Используйте только буквы и подчёркивания', 'error');
            return;
        }

        const permissions = getSelectedPermissions();

        try {
            const response = await fetch('/api/roles', {
                method: 'POST',
                headers: authHeaders(),
                body: JSON.stringify({ role: roleName, permissions: permissions })
            });

            const data = await response.json();
            if (response.ok) {
                showToast(`Роль "${roleName}" создана с ${permissions.length} правами`, 'success');
                closeAddRoleModal();
                
                const select = document.getElementById('roleSelect');
                const option = document.createElement('option');
                option.value = roleName;
                option.textContent = roleName;
                select.appendChild(option);
                
                select.value = roleName;
                loadRolePermissions();
                
                initialRolePermissions[roleName] = permissions;
            } else {
                showToast(data.error || 'Ошибка создания', 'error');
            }
        } catch (error) {
            showToast('Ошибка соединения', 'error');
        }
    };

    document.getElementById('addRoleModal').addEventListener('click', function(e) {
        if (e.target === this) closeAddRoleModal();
    });
})();
</script>

<style>
.role-selector-section {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 2rem;
    padding: 1rem;
    background: var(--bg-card);
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.role-selector-section label {
    font-weight: 600;
    color: var(--text-primary);
}

.role-selector-section select {
    padding: 0.5rem 1rem;
    border: 1px solid var(--border-color);
    border-radius: 6px;
    background: var(--bg-secondary);
    color: var(--text-primary);
    font-size: 1rem;
    min-width: 200px;
    cursor: pointer;
}

.role-selector-section select:focus {
    outline: none;
    border-color: var(--accent);
}

.permissions-container {
    margin-bottom: 2rem;
}

.permissions-container h2 {
    margin-bottom: 0.5rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
}

.role-description {
    color: var(--text-secondary);
    margin-bottom: 1.5rem;
    font-size: 0.9rem;
}

/* Screen sections */
.screen-section {
    margin-bottom: 1rem;
    padding: 1rem;
    background: var(--bg-card);
    border-radius: 8px;
    border: 1px solid var(--border-color);
    transition: all 0.2s ease;
}

.screen-section.screen-enabled {
    border-color: var(--success-color);
    background: rgba(76, 175, 80, 0.05);
}

.screen-header {
    display: flex;
    align-items: center;
    padding: 0.5rem 0;
}

.screen-checkbox-label {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    cursor: pointer;
    font-weight: 600;
    font-size: 1rem;
    color: var(--text-primary);
}

.screen-checkbox-label input[type="checkbox"] {
    width: 20px;
    height: 20px;
    cursor: pointer;
    accent-color: var(--success-color);
}

.screen-name {
    flex: 1;
}

.screen-operations {
    margin-top: 1rem;
    padding-left: 2.5rem;
    border-left: 2px solid var(--border-color);
    padding-left: 2rem;
}

.operations-list {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
}

.operation-item {
    display: flex;
    align-items: flex-start;
    gap: 0.5rem;
    padding: 0.5rem;
    border-radius: 6px;
    transition: background 0.2s ease;
}

.operation-item:hover {
    background: var(--hover-bg);
}

.operation-item input[type="checkbox"] {
    width: 18px;
    height: 18px;
    cursor: pointer;
    margin-top: 0.2rem;
    accent-color: var(--success-color);
}

.operation-label {
    font-weight: 500;
    color: var(--text-primary);
    min-width: 150px;
}

.operation-desc {
    color: var(--text-secondary);
    font-size: 0.85rem;
    flex: 1;
}

.role-actions {
    display: flex;
    gap: 1rem;
    justify-content: flex-end;
    margin-top: 2rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border-color);
}

@media (max-width: 768px) {
    .screen-operations {
        padding-left: 1rem;
    }
    
    .operation-item {
        flex-direction: column;
        gap: 0.25rem;
    }
    
    .operation-label {
        min-width: auto;
    }
    
    .role-actions {
        flex-direction: column;
    }
    
    .role-selector-section {
        flex-direction: column;
        align-items: stretch;
    }
}

/* Modal styles */
.modal-large {
    max-width: 700px;
}

.permission-presets {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    margin-bottom: 1rem;
}

.permission-presets .btn {
    padding: 0.5rem 1rem;
    font-size: 0.9rem;
}

.custom-permissions {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 0.5rem;
    padding: 1rem;
    background: var(--bg-secondary);
    border-radius: 8px;
    max-height: 300px;
    overflow-y: auto;
}

.checkbox-label {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.25rem;
    cursor: pointer;
}

.checkbox-label input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: var(--success-color);
    cursor: pointer;
}

.checkbox-label span {
    color: var(--text-primary);
    font-size: 0.9rem;
}
</style>
{% endblock %}
