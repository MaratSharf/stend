<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MES — Смена пароля</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container" style="max-width:400px;margin-top:100px;">
        <div class="card" style="padding:30px;">
            <h1 style="text-align:center;margin-bottom:10px;font-size:1.3rem;">🔑 Смена пароля</h1>
            <p style="text-align:center;color:var(--text-secondary);margin-bottom:20px;font-size:0.9rem;">
                Необходимо изменить пароль при первом входе
            </p>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="toast {{ 'error' if category == 'error' else 'success' }}" style="margin-bottom:15px;">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST">
                <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">
                <div class="form-group">
                    <label for="new_password">Новый пароль *</label>
                    <input type="password" name="new_password" id="new_password" required minlength="6"
                           placeholder="Минимум 6 символов">
                </div>
                <div class="form-group">
                    <label for="confirm_password">Подтверждение пароля *</label>
                    <input type="password" name="confirm_password" id="confirm_password" required minlength="6"
                           placeholder="Повторите пароль">
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;padding:12px;">
                    Сохранить и продолжить
                </button>
            </form>
        </div>
    </div>
</body>
</html>
