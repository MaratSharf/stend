<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MES - Производственная система</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏭 MES Production System</h1>
            <div class="header-actions">
                <nav>
                    <a href="/" class="active">Заказы</a>
                    <a href="/tracking">Карта станций</a>
                </nav>
                <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">🌙</button>
            </div>
        </header>

        <!-- Statistics -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-value" id="statTotal">0</div>
                <div class="stat-label">Всего заказов</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statBuffer">0</div>
                <div class="stat-label">В буфере</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statProduction">0</div>
                <div class="stat-label">В производстве</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statCompleted">0</div>
                <div class="stat-label">Завершено</div>
            </div>
        </div>

        <!-- Actions -->
        <div class="filter-section">
            <button class="btn btn-primary" onclick="MESOrders.openModal('createOrderModal')">
                + Создать заказ
            </button>
            <select id="statusFilter">
                <option value="all">Все статусы</option>
                <option value="buffer">Буфер</option>
                <option value="production">В производстве</option>
                <option value="completed">Завершено</option>
                <option value="cancelled">Отменено</option>
            </select>
        </div>

        <!-- Orders Table -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Партия</th>
                        <th>№ заказа</th>
                        <th>Код товара</th>
                        <th>Цвет</th>
                        <th>Кол-во</th>
                        <th>Статус</th>
                        <th>Станция</th>
                        <th>Создан</th>
                        <th>Запущен</th>
                        <th>Завершён</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="ordersTableBody">
                    <tr><td colspan="11" style="text-align:center;">Загрузка...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Create Order Modal -->
    <div class="modal-overlay" id="createOrderModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Создать новый заказ</h2>
                <button class="modal-close" onclick="MESOrders.closeModal('createOrderModal')">&times;</button>
            </div>
            <form id="createOrderForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="batch">Партия *</label>
                        <input type="text" name="batch" id="batch" required placeholder="BATCH">
                    </div>
                    <div class="form-group">
                        <label for="product_code">Код товара/модель *</label>
                        <input type="text" name="product_code" id="product_code" required placeholder="MODEL-X">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="color">Цвет *</label>
                        <input type="text" name="color" id="color" required placeholder="Black">
                    </div>
                    <div class="form-group">
                        <label for="quantity">Количество *</label>
                        <input type="number" name="quantity" id="quantity" required min="1" value="1">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="MESOrders.closeModal('createOrderModal')">Отмена</button>
                    <button type="submit" class="btn btn-primary">Создать</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="{{ url_for('static', filename='theme.js') }}"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script src="{{ url_for('static', filename='orders.js') }}"></script>
</body>
</html>
