<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>MES — Карта производства</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=2">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏭 MES Production System</h1>
            <div class="header-actions">
                <nav>
                    <a href="/">Заказы</a>
                    <a href="/tracking">Карта станций</a>
                    <a href="/station">Станция</a>
                    <a href="/map" class="active">Производство</a>
                    {% if user and user.role == 'admin' %}
                    <a href="/users">Пользователи</a>
                    {% endif %}
                </nav>
                <div style="display:flex;align-items:center;gap:10px;">
                    <span style="font-size:0.85rem;color:var(--text-secondary);">
                        {{ user.username }} ({{ user.role_label }})
                    </span>
                    <a href="/logout" class="btn btn-sm btn-secondary">Выйти</a>
                    <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">🌙</button>
                </div>
            </div>
        </header>

        <!-- Pipeline SVG -->
        <div class="pipeline-wrapper" id="pipelineWrapper">
            <svg id="pipelineSvg" viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <!-- Glow filter -->
                    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                        <feGaussianBlur stdDeviation="6" result="blur"/>
                        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
                    </filter>
                    <!-- Soft shadow -->
                    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
                        <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.15"/>
                    </filter>
                    <!-- Gradients -->
                    <linearGradient id="pipeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="var(--status-buffer)" stop-opacity="0.4"/>
                        <stop offset="100%" stop-color="var(--status-completed)" stop-opacity="0.6"/>
                    </linearGradient>
                    <linearGradient id="nodeBuffer" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#6b7280"/>
                        <stop offset="100%" stop-color="#4b5563"/>
                    </linearGradient>
                    <linearGradient id="nodeProduction" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#3b82f6"/>
                        <stop offset="100%" stop-color="#2563eb"/>
                    </linearGradient>
                    <linearGradient id="nodeCompleted" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#22c55e"/>
                        <stop offset="100%" stop-color="#16a34a"/>
                    </linearGradient>
                    <linearGradient id="nodeEmpty" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="var(--bg-card)"/>
                        <stop offset="100%" stop-color="var(--bg-secondary)"/>
                    </linearGradient>
                    <!-- Pulse animation for active stations -->
                    <style>
                        @keyframes pulse {
                            0%, 100% { opacity: 0.6; }
                            50% { opacity: 1; }
                        }
                        .pulse-ring {
                            animation: pulse 2s ease-in-out infinite;
                        }
                        @keyframes flowDash {
                            to { stroke-dashoffset: -24; }
                        }
                        .flow-line {
                            animation: flowDash 1s linear infinite;
                        }
                    </style>
                </defs>

                <!-- Connecting pipes (drawn first, behind nodes) -->
                <g id="pipesGroup"></g>

                <!-- Station nodes -->
                <g id="nodesGroup"></g>

                <!-- Order badges on nodes -->
                <g id="ordersGroup"></g>
            </svg>
        </div>

        <!-- Legend -->
        <div class="legend" style="display:flex;justify-content:center;gap:24px;margin-top:20px;flex-wrap:wrap;">
            <div class="legend-item">
                <span class="legend-dot legend-dot--buffer"></span> Буфер
            </div>
            <div class="legend-item">
                <span class="legend-dot legend-dot--production"></span> В производстве
            </div>
            <div class="legend-item">
                <span class="legend-dot legend-dot--completed"></span> Завершено
            </div>
            <div class="legend-item">
                <span class="legend-dot legend-dot--empty"></span> Пусто
            </div>
        </div>

        <!-- Stats below pipeline -->
        <div class="stats-grid" id="statsGrid" style="margin-top:30px;">
            <div class="stat-card">
                <div class="stat-value" id="statTotal">0</div>
                <div class="stat-label">Всего заказов</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statBuffer">0</div>
                <div class="stat-label">В буфере</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statProduction">0</div>
                <div class="stat-label">В производстве</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statCompleted">0</div>
                <div class="stat-label">Завершено</div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="{{ url_for('static', filename='theme.js') }}"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script src="{{ url_for('static', filename='map.js') }}"></script>
</body>
</html>
