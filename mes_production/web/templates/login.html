<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MES — Вход</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container" style="max-width:400px;margin-top:100px;">
        <div class="card" style="padding:30px;">
            <h1 style="text-align:center;margin-bottom:25px;font-size:1.5rem;">🏭 MES Production</h1>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="toast {{ 'error' if category == 'error' else 'success' }}" style="margin-bottom:15px;">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="form-group">
                    <label for="username">Логин</label>
                    <input type="text" name="username" id="username" required autofocus
                           placeholder="admin">
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" name="password" id="password" required
                           placeholder="••••••••">
                </div>
                <div class="form-group" style="display:flex;align-items:center;gap:8px;">
                    <input type="checkbox" name="remember" id="remember" value="yes">
                    <label for="remember" style="margin:0;">Запомнить меня</label>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;padding:12px;">
                    Войти
                </button>
            </form>
        </div>
    </div>
</body>
</html>
